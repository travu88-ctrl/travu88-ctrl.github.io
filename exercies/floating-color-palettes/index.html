<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Floating color palettes</title>
        <link href="css/style.css" rel="stylesheet">
    </head>
    <body>
        <div class="color-palette">
            <h2>Ben 10 colors</h2>

            <h4 class="color" id="shoes">#0D0A0B</h4>
            <h4 class="color" id="pants">#454955</h4>
            <h4 class="color" id="shirt">#F3EFF5</h4>
            <h4 class="color" id="omni">#72B01D</h4>
            <h4 class="color" id="trix">#3F7D20</h4>
        </div>

        <div class="color-palette-2"> 
            <h2>Cartoon Network</h2>

            <h4 class="color" id="color">#00aeef</h4>
            <h4 class="color" id="color-1">#ec008c</h4>
            <h4 class="color" id="color-2">#ffd93f</h4>
            <h4 class="color" id="color-3">#000000</h4>
            <h4 class="color" id="color-4">#ffffff</h4>
        </dv>

        <div class="color-palette-3"> 
            <h2>Powerpuff Girls</h2>

            <h4 class="color" id="color-5">#ff4d6d</h4>
            <h4 class="color" id="color-6">#48cae4</h4>
            <h4 class="color" id="color-7">#70e000</h4>
            <h4 class="color" id="color-8">#48761b</h4>
            <h4 class="color" id="color-9">#e70c0c</h4>
        </dv>


    </body>
</html>
